services:
  app:
    build: .
    ports:
      - "8081:8080"
    environment:
      - DB_DSN=host=db port=5432 user=postgres password=postgres dbname=chargebacks sslmode=disable
      - PORT=8080
      - LOCK_TIMEOUT_MS=2000
      - PROCESSING_DELAY_MS=200
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure
    networks:
      - chargeback-net

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=chargebacks
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - chargeback-net

networks:
  chargeback-net:
    driver: bridge